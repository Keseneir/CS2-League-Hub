<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Профиль</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<!-- Keyframes инжектируются ОДИН РАЗ сюда — не трогать -->
<style id="cosmetic-kf"></style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090b0f;
  --s0:#0e1118;
  --s1:#141820;
  --s2:#1c2230;
  --border:#1e2538;
  --bh:#2e3a52;
  --accent:#f59e0b;
  --as:rgba(245,158,11,.12);
  --ag:rgba(245,158,11,.25);
  --danger:#ef4444;
  --ds:rgba(239,68,68,.12);
  --text:#e2e8f0;
  --muted:#4e5a72;
  --r:10px;--r2:7px;
  font-family:'Inter',system-ui,sans-serif;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text)}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* ── LAYOUT ── */
.page{max-width:1080px;margin:0 auto;padding:28px 16px 60px}

/* ── HEADER ── */
.pf-hdr{
  position:relative;overflow:hidden;
  border-radius:var(--r);border:1px solid var(--border);
  background:var(--s1);padding:28px 24px 22px;
  display:flex;gap:20px;align-items:flex-start;
  margin-bottom:20px;
}
/* фон-косметика — строгая изоляция, не вылезает за пределы */
.pf-hdr-bg{
  position:absolute;inset:0;z-index:0;opacity:.35;
  pointer-events:none;
  /* ключевое: анимация НЕ перерисовывает родителей */
  contain:strict;
  will-change:transform;
  transform:translateZ(0);
}
.pf-hdr>*:not(.pf-hdr-bg){position:relative;z-index:1}

/* аватар + рамка */
.pf-av-wrap{
  position:relative;flex-shrink:0;
  width:88px;height:88px;
  isolation:isolate;
}
.pf-av-wrap img{
  width:88px;height:88px;border-radius:50%;
  display:block;object-fit:cover;
}
.pf-av-frame{
  position:absolute;inset:-7px;border-radius:50%;
  pointer-events:none;
  /* GPU слой — анимация не влияет на layout */
  will-change:transform,opacity;
  contain:layout paint;
  transform:translateZ(0);
}

.pf-info{flex:1;min-width:0}
.pf-name{
  font-size:22px;font-weight:800;letter-spacing:-.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:5px;
}
.pf-rank{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;color:var(--muted);margin-bottom:8px;
}
.pf-rank-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
.pf-badges{display:flex;flex-wrap:wrap;gap:6px}
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:100px;
  font-size:11px;font-weight:600;letter-spacing:.04em;
  border:1px solid var(--border);background:var(--s0);color:var(--muted);
}
.badge-team{color:var(--accent);border-color:var(--as);background:var(--as)}
.badge-admin{color:#a78bfa;border-color:rgba(167,139,250,.2);background:rgba(167,139,250,.1)}
.pf-stats{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.pf-stat{
  background:var(--s0);border:1px solid var(--border);
  border-radius:var(--r2);padding:6px 12px;
  display:flex;gap:6px;align-items:center;
}
.pf-stat-val{font-size:14px;font-weight:700}
.pf-stat-lbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.faceit-lv{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:4px;
  font-size:12px;font-weight:800;color:#fff;flex-shrink:0;
}

/* ── TABS ── */
.tabs-nav{
  display:flex;gap:2px;
  border-bottom:1px solid var(--border);
  margin-bottom:22px;
}
.tab-btn{
  padding:9px 16px;background:none;border:none;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  cursor:pointer;
  font:600 12px/1 'Inter',sans-serif;
  letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
  transition:color .15s,border-color .15s;
  display:flex;align-items:center;gap:6px;
}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-badge{
  background:var(--danger);color:#fff;
  border-radius:100px;padding:1px 5px;
  font-size:10px;font-weight:700;
}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* ── UTILITY ── */
.sec-lbl{
  font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);margin-bottom:12px;
}
.row-btwn{display:flex;align-items:center;justify-content:space-between;gap:12px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.sec-gap{margin-bottom:24px}
.empty{text-align:center;padding:36px 20px;color:var(--muted);font-size:14px;line-height:1.7}
.loading{text-align:center;padding:36px;color:var(--muted);font-size:13px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  padding:6px 14px;border-radius:6px;
  font:700 11px/1 'Inter',sans-serif;
  letter-spacing:.05em;text-transform:uppercase;
  cursor:pointer;border:1px solid transparent;
  transition:background .12s,transform .1s;white-space:nowrap;
}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-full{width:100%}
.btn-eq{background:var(--as);border-color:rgba(245,158,11,.2);color:var(--accent)}
.btn-eq:hover{background:var(--ag)}
.btn-uneq{background:var(--ds);border-color:rgba(239,68,68,.2);color:var(--danger)}
.btn-uneq:hover{background:rgba(239,68,68,.22)}
.btn-shop{background:var(--accent);color:#000;font-weight:800;padding:8px 18px}
.btn-shop:hover{opacity:.88}

/* ── EQUIPPED ROW ── */
.eq-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
@media(max-width:520px){.eq-row{grid-template-columns:1fr}}
.eq-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.eq-card-lbl{
  font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);margin-bottom:10px;
}
.eq-card-body{display:flex;align-items:center;gap:12px;margin-bottom:12px}
/* мини-превью рамки в eq-card */
.eq-prev-av{
  position:relative;flex-shrink:0;
  width:44px;height:44px;isolation:isolate;
}
.eq-prev-av img{width:44px;height:44px;border-radius:50%;object-fit:cover;display:block;background:var(--s2)}
.eq-prev-av-frame{
  position:absolute;inset:-4px;border-radius:50%;pointer-events:none;
  will-change:transform,opacity;contain:layout paint;transform:translateZ(0);
}
/* мини-превью фона в eq-card */
.eq-prev-bg{
  width:48px;height:32px;border-radius:6px;flex-shrink:0;
  will-change:transform,opacity;contain:layout paint;transform:translateZ(0);
}
.eq-item-name{font-size:14px;font-weight:600;color:var(--text)}
.eq-item-empty{font-size:13px;color:var(--muted);font-style:italic}

/* ── INVENTORY GRID ── */
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.inv-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 12px 12px;
  display:flex;flex-direction:column;align-items:center;gap:7px;
  transition:border-color .15s,background .15s;
}
.inv-card:hover{border-color:var(--bh);background:var(--s2)}
.inv-card.inv-eq{
  border-color:rgba(245,158,11,.38);
  background:linear-gradient(160deg,rgba(245,158,11,.07) 0%,var(--s1) 100%);
}
/* превью внутри карточки — GPU layer, строгая изоляция */
.inv-thumb{
  position:relative;width:54px;height:54px;
  display:flex;align-items:center;justify-content:center;
  isolation:isolate;will-change:transform;
}
.inv-thumb-circle{
  width:54px;height:54px;border-radius:50%;
  background:var(--s2);display:flex;align-items:center;
  justify-content:center;font-size:24px;
}
.inv-thumb-frame{
  position:absolute;inset:-5px;border-radius:50%;pointer-events:none;
  will-change:transform,opacity;contain:layout paint;transform:translateZ(0);
}
.inv-thumb-rect{
  width:54px;height:36px;border-radius:6px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  will-change:transform,opacity;contain:layout paint;transform:translateZ(0);
}
.inv-card-name{font-size:12px;font-weight:600;text-align:center;color:var(--text);line-height:1.3}
.inv-card-type{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}

/* ── FRIENDS / USER ROWS ── */
.user-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.user-row:last-child{border-bottom:none}
.user-row img{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0}
.user-row-name{font-size:14px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── NOTICES ── */
.notice{
  background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.25);
  border-radius:var(--r);padding:12px 16px;margin-bottom:10px;
  display:flex;align-items:center;gap:10px;font-size:13px;line-height:1.4;
}
.notice-msg{flex:1}
</style>
</head>
<body>
<div class="page">

  <!-- ════════════════ PROFILE HEADER ════════════════ -->
  <div class="pf-hdr" id="pf-hdr">
    <div class="pf-hdr-bg" id="pf-bg"></div>

    <div class="pf-av-wrap">
      <img id="pf-av" src="" alt="avatar"/>
      <div class="pf-av-frame" id="pf-av-frame"></div>
    </div>

    <div class="pf-info">
      <div class="pf-name" id="pf-name">—</div>
      <div class="pf-rank" id="pf-rank" style="display:none">
        <span class="pf-rank-dot"></span>
        <span id="pf-rank-txt"></span>
      </div>
      <div class="pf-badges" id="pf-badges"></div>
      <div class="pf-stats" id="pf-stats"></div>
    </div>

    <div style="position:relative;z-index:1;flex-shrink:0">
      <a href="/shop.html" class="btn btn-shop">🛒 Магазин</a>
    </div>
  </div>

  <!-- ════════════════ TABS ════════════════ -->
  <div class="tabs-nav">
    <button class="tab-btn active" data-tab="cosmetics">🎨 Кастомизация</button>
    <button class="tab-btn" data-tab="overview">👤 Профиль</button>
    <button class="tab-btn" data-tab="friends">
      👥 Друзья
      <span class="tab-badge" id="badge-fr" style="display:none"></span>
    </button>
    <button class="tab-btn" data-tab="team">
      🏅 Команда
      <span class="tab-badge" id="badge-ti" style="display:none"></span>
    </button>
  </div>

  <!-- ════════════════ TAB: КАСТОМИЗАЦИЯ ════════════════ -->
  <div class="tab-pane active" id="tab-cosmetics">

    <div class="row-btwn sec-gap" style="margin-bottom:12px">
      <p class="sec-lbl" style="margin-bottom:0">Надето сейчас</p>
    </div>

    <div class="eq-row sec-gap">
      <!-- Рамка аватара -->
      <div class="eq-card">
        <div class="eq-card-lbl">🖼 Рамка аватара</div>
        <div class="eq-card-body">
          <div class="eq-prev-av" id="eq-frame-prev">
            <img id="eq-frame-img" src="" alt="" style="display:none"/>
            <div class="eq-prev-av-frame" id="eq-frame-css"></div>
          </div>
          <span id="eq-frame-name" class="eq-item-empty">Не выбрана</span>
        </div>
        <button class="btn btn-uneq btn-full" id="btn-uneq-frame" style="display:none"
                onclick="doUnequip('avatarFrame')">✕ Снять</button>
      </div>

      <!-- Фон профиля -->
      <div class="eq-card">
        <div class="eq-card-lbl">🎨 Фон профиля</div>
        <div class="eq-card-body">
          <div class="eq-prev-bg" id="eq-bg-css"></div>
          <span id="eq-bg-name" class="eq-item-empty">Не выбран</span>
        </div>
        <button class="btn btn-uneq btn-full" id="btn-uneq-bg" style="display:none"
                onclick="doUnequip('profileBg')">✕ Снять</button>
      </div>
    </div>

    <div class="row-btwn" style="margin-bottom:12px">
      <p class="sec-lbl" style="margin-bottom:0">Инвентарь</p>
    </div>
    <div class="inv-grid" id="inv-grid">
      <div class="loading" style="grid-column:1/-1">Загрузка…</div>
    </div>

  </div>

  <!-- ════════════════ TAB: ПРОФИЛЬ ════════════════ -->
  <div class="tab-pane" id="tab-overview">
    <div class="card sec-gap">
      <p class="sec-lbl">О себе</p>
      <p id="bio-txt" style="font-size:14px;line-height:1.7;color:var(--muted);font-style:italic">Не заполнено</p>
    </div>
    <div class="card" id="links-card" style="display:none">
      <p class="sec-lbl">Контакты</p>
      <div id="links-list" style="display:flex;flex-direction:column;gap:8px;font-size:14px"></div>
    </div>

  <!-- ════════════════ TAB: ДРУЗЬЯ ════════════════ -->
  <div class="tab-pane" id="tab-friends">

    </div>
  </div>

  <!-- ════════════════ TAB: КОМАНДА ════════════════ -->
  <div class="tab-pane" id="tab-team">
    <div id="tinvites-block"></div>
    <div id="team-block"><div class="loading">Загрузка…</div></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  СОСТОЯНИЕ
// ─────────────────────────────────────────────────────────────────────────────
const _kfStyle   = document.getElementById('cosmetic-kf');
const _kfSeen    = new Set();   // id предметов, чьи keyframes уже вшиты
let   _kfBuf     = '';          // буфер — пишем в DOM ОДИН РАЗ

// ─────────────────────────────────────────────────────────────────────────────
//  ПРАВИЛЬНЫЕ МЕТКИ ТИПОВ
//  Именно здесь была ошибка — всё показывалось как «ФОН»
// ─────────────────────────────────────────────────────────────────────────────
const TYPE_LABEL = { avatarFrame: 'Рамка', profileBg: 'Фон' };
const typeLabel  = t => TYPE_LABEL[t] ?? 'Предмет';

// ─────────────────────────────────────────────────────────────────────────────
//  ВШИВКА KEYFRAMES — только если ещё не вшито, только батчем
//
//  Проблема производительности: если делать _kfStyle.textContent += каждый раз,
//  браузер пересчитывает ВСЕ стили на каждой итерации.
//  Решение: буферизуем все @keyframes, пишем в DOM один раз через flushKF().
// ─────────────────────────────────────────────────────────────────────────────
function bufferKF(item) {
  if (!item?._id || !item.keyframes || _kfSeen.has(String(item._id))) return;
  _kfBuf += '\n' + item.keyframes;
  _kfSeen.add(String(item._id));
}
function flushKF() {
  // Одна запись в DOM → одна перестройка стилей
  if (_kfBuf !== _kfStyle.textContent) _kfStyle.textContent = _kfBuf;
}

// ─────────────────────────────────────────────────────────────────────────────
//  ПРИМЕНЕНИЕ CSS к элементу
//  Используем style.cssText, а не setAttribute — это безопаснее для CSS строк
//  с кавычками (font-family и т.п.)
// ─────────────────────────────────────────────────────────────────────────────
function applyCSS(el, css) {
  if (!el) return;
  el.style.cssText = css || '';
}

// ─────────────────────────────────────────────────────────────────────────────
//  FACEIT цвета
// ─────────────────────────────────────────────────────────────────────────────
function faceitColor(l) {
  if (!l) return '#666';
  if (l <= 3) return '#f59e0b';
  if (l <= 6) return '#f97316';
  if (l <= 8) return '#ef4444';
  if (l <= 9) return '#a855f7';
  return '#ec4899';
}

// ─────────────────────────────────────────────────────────────────────────────
//  XSS защита
// ─────────────────────────────────────────────────────────────────────────────
const esc = s => String(s ?? '')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ─────────────────────────────────────────────────────────────────────────────
//  HEADER
// ─────────────────────────────────────────────────────────────────────────────
function renderHeader(d) {
  const ec = d.equippedCosmetics || {};

  // Аватар
  const avEl = document.getElementById('pf-av');
  if (d.avatar) avEl.src = d.avatar;

  // Имя
  document.getElementById('pf-name').textContent = d.displayName || '—';

  // Ранг
  if (d.rank && d.rank !== 'Unranked') {
    document.getElementById('pf-rank-txt').textContent = d.rank;
    document.getElementById('pf-rank').style.display = '';
  }

  // Бейджи
  const badges = [];
  if (d.team) badges.push(`<span class="badge badge-team">⚔ [${esc(d.team.tag)}] ${esc(d.team.name)}</span>`);
  if (d.isAdmin) badges.push(`<span class="badge badge-admin">⚡ Администратор</span>`);
  document.getElementById('pf-badges').innerHTML = badges.join('');

  // Статистика
  const stats = [];
  if (d.faceitLevel != null) {
    const c = faceitColor(d.faceitLevel);
    stats.push(`<div class="pf-stat">
      <span class="faceit-lv" style="background:${c}">${d.faceitLevel}</span>
      <span class="pf-stat-lbl">FACEIT</span></div>`);
  }
  if (d.hoursInCS2 != null) {
    stats.push(`<div class="pf-stat">
      <span class="pf-stat-val">${Number(d.hoursInCS2).toLocaleString('ru')}</span>
      <span class="pf-stat-lbl">часов в CS2</span></div>`);
  }
  document.getElementById('pf-stats').innerHTML = stats.join('');

  // ── Рамка аватара в шапке
  const frameEl = document.getElementById('pf-av-frame');
  if (ec.avatarFrame?._id) {
    bufferKF(ec.avatarFrame);
    flushKF();
    applyCSS(frameEl, ec.avatarFrame.css);
  } else {
    applyCSS(frameEl, '');
  }

  // ── Фон профиля в шапке
  const bgEl = document.getElementById('pf-bg');
  if (ec.profileBg?._id) {
    bufferKF(ec.profileBg);
    flushKF();
    applyCSS(bgEl, ec.profileBg.css);
    bgEl.style.display = '';
  } else {
    bgEl.style.display = 'none';
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  EQUIPPED SECTION
// ─────────────────────────────────────────────────────────────────────────────
function renderEquipped(d) {
  const ec  = d.equippedCosmetics || {};
  const av  = d.avatar || '';

  // Рамка
  const fName  = document.getElementById('eq-frame-name');
  const fImg   = document.getElementById('eq-frame-img');
  const fCss   = document.getElementById('eq-frame-css');
  const fBtn   = document.getElementById('btn-uneq-frame');
  if (ec.avatarFrame?._id) {
    fName.textContent = ec.avatarFrame.name;
    fName.className   = 'eq-item-name';
    fImg.src          = av;
    fImg.style.display = '';
    applyCSS(fCss, ec.avatarFrame.css);
    fBtn.style.display = '';
  } else {
    fName.textContent  = 'Не выбрана';
    fName.className    = 'eq-item-empty';
    fImg.style.display = 'none';
    applyCSS(fCss, '');
    fBtn.style.display = 'none';
  }

  // Фон
  const bName  = document.getElementById('eq-bg-name');
  const bCss   = document.getElementById('eq-bg-css');
  const bBtn   = document.getElementById('btn-uneq-bg');
  if (ec.profileBg?._id) {
    bName.textContent = ec.profileBg.name;
    bName.className   = 'eq-item-name';
    applyCSS(bCss, ec.profileBg.css);
    bBtn.style.display = '';
  } else {
    bName.textContent  = 'Не выбран';
    bName.className    = 'eq-item-empty';
    applyCSS(bCss, '');
    bBtn.style.display = 'none';
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  INVENTORY GRID
//
//  Ключевые исправления:
//  1. Сначала буферизуем ВСЕ keyframes, потом один flushKF()
//  2. innerHTML пишется ОДИН РАЗ (не append в цикле)
//  3. После innerHTML, CSS применяется через style.cssText (не атрибут в HTML)
//     → нет проблем с HTML-экранированием кавычек в CSS-значениях
// ─────────────────────────────────────────────────────────────────────────────
function renderInventory(d) {
  const grid = document.getElementById('inv-grid');
  const inv  = (d.personalInventory || []).filter(e => e.itemId);
  const ec   = d.equippedCosmetics || {};

  const eqFrameId = String(ec.avatarFrame?._id ?? '');
  const eqBgId    = String(ec.profileBg?._id   ?? '');

  // ШАГ 1 — вшиваем ВСЕ keyframes разом
  inv.forEach(e => bufferKF(e.itemId));
  flushKF();  // единственный вызов — единственный пересчёт стилей

  if (!inv.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      Инвентарь пуст.<br>
      <a href="/shop.html">Зайди в магазин</a> и купи что-нибудь!
    </div>`;
    return;
  }

  // ШАГ 2 — строим HTML один раз, БЕЗ CSS в атрибутах
  //         (CSS будем ставить через style.cssText после вставки)
  const cssMap = {};   // itemId → { frameEl: css, bgEl: css }

  const html = inv.map(entry => {
    const item    = entry.itemId;
    const itemId  = String(item._id);
    const isFrame = item.cosmeticType === 'avatarFrame';
    const slot    = isFrame ? 'avatarFrame' : 'profileBg';
    const equipped= (isFrame ? eqFrameId : eqBgId) === itemId;
    const label   = typeLabel(item.cosmeticType);
    const icon    = esc(item.icon || (isFrame ? '🖼' : '🎨'));
    const name    = esc(item.name);

    // Сохраняем CSS для применения после innerHTML
    if (item.css) cssMap[itemId] = item.css;

    const thumbHtml = isFrame
      ? `<div class="inv-thumb">
           <div class="inv-thumb-circle">${icon}</div>
           <div class="inv-thumb-frame" data-css-id="${itemId}"></div>
         </div>`
      : `<div class="inv-thumb">
           <div class="inv-thumb-rect" data-css-id="${itemId}">${icon}</div>
         </div>`;

    const btnHtml = equipped
      ? `<button class="btn btn-uneq btn-full" data-slot="${slot}" data-action="uneq">Снять</button>`
      : `<button class="btn btn-eq  btn-full" data-id="${itemId}" data-slot="${slot}" data-action="eq">Надеть</button>`;

    return `<div class="inv-card${equipped ? ' inv-eq' : ''}">
      ${thumbHtml}
      <div class="inv-card-name">${name}</div>
      <div class="inv-card-type">${label}</div>
      ${btnHtml}
    </div>`;
  }).join('');

  // ШАГ 3 — один вызов innerHTML
  grid.innerHTML = html;

  // ШАГ 4 — применяем CSS через style.cssText (безопасно для кавычек в CSS)
  grid.querySelectorAll('[data-css-id]').forEach(el => {
    const css = cssMap[el.dataset.cssId];
    if (css) el.style.cssText = css;
  });
}

// ─────────────────────────────────────────────────────────────────────────────
//  OVERVIEW TAB
// ─────────────────────────────────────────────────────────────────────────────
function renderOverview(d) {
  const bioEl = document.getElementById('bio-txt');
  if (d.bio) {
    bioEl.textContent   = d.bio;
    bioEl.style.fontStyle = '';
    bioEl.style.color   = '';
  }
  const links = [];
  if (d.telegramUsername) links.push(`Telegram: <a href="https://t.me/${esc(d.telegramUsername)}" target="_blank">@${esc(d.telegramUsername)}</a>`);
  if (d.discordUsername)  links.push(`Discord: <strong>${esc(d.discordUsername)}</strong>`);
  if (links.length) {
    document.getElementById('links-list').innerHTML = links.map(l=>`<div>${l}</div>`).join('');
    document.getElementById('links-card').style.display = '';
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  FRIENDS TAB
// ─────────────────────────────────────────────────────────────────────────────
function renderFriends(d) {
  const reqsBlock = document.getElementById('reqs-block');
  const listEl    = document.getElementById('friends-list');
  const badge     = document.getElementById('badge-fr');
  const reqs      = d.friendRequests || [];
  const friends   = d.friends        || [];

  badge.textContent    = reqs.length || '';
  badge.style.display  = reqs.length ? '' : 'none';

  if (reqs.length) {
    reqsBlock.innerHTML = `<div class="card sec-gap" style="margin-bottom:14px">
      <p class="sec-lbl">Входящие заявки в друзья</p>
      ${reqs.map(r=>`<div class="user-row">
        <img src="${esc(r.from?.avatar||'')}" alt=""/>
        <span class="user-row-name">${esc(r.from?.displayName||'—')}</span>
        <button class="btn btn-eq"   data-fid="${r.from?._id}" data-faction="accept">✓ Принять</button>
        <button class="btn btn-uneq" data-fid="${r.from?._id}" data-faction="decline" style="margin-left:4px">✕</button>
      </div>`).join('')}
    </div>`;
  } else reqsBlock.innerHTML = '';

  listEl.innerHTML = friends.length
    ? friends.map(f=>`<div class="user-row">
        <img src="${esc(f.avatar||'')}" alt=""/>
        <span class="user-row-name"><a href="/player.html?steamId=${esc(f.steamId)}">${esc(f.displayName||'—')}</a></span>
      </div>`).join('')
    : '<div class="empty">Пока нет друзей</div>';
}

// ─────────────────────────────────────────────────────────────────────────────
//  TEAM TAB
// ─────────────────────────────────────────────────────────────────────────────
function renderTeam(d) {
  const invBlock = document.getElementById('tinvites-block');
  const block    = document.getElementById('team-block');
  const badge    = document.getElementById('badge-ti');
  const invites  = d.teamInvites || [];

  badge.textContent   = invites.length || '';
  badge.style.display = invites.length ? '' : 'none';

  if (invites.length) {
    invBlock.innerHTML = `<div class="card sec-gap" style="margin-bottom:14px">
      <p class="sec-lbl">Приглашения в команду</p>
      ${invites.map((inv,i)=>`<div class="user-row">
        ${inv.teamId?.logo?`<img src="${esc(inv.teamId.logo)}" alt=""/>`:''}
        <span class="user-row-name">[${esc(inv.teamId?.tag||'')}] ${esc(inv.teamId?.name||'—')}</span>
        <button class="btn btn-eq"   data-ti="${i}" data-taction="accept">Принять</button>
        <button class="btn btn-uneq" data-ti="${i}" data-taction="decline" style="margin-left:4px">✕</button>
      </div>`).join('')}
    </div>`;
  } else invBlock.innerHTML = '';

  if (!d.team) {
    block.innerHTML = `<div class="empty">Вы не в команде.<br><a href="/teams.html">Найти команду</a></div>`;
    return;
  }
  const t = d.team;
  const members = [...(t.members||[]), ...(t.subs||[])];
  block.innerHTML = `<div class="card">
    <div class="row-btwn" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:10px">
        ${t.logo?`<img src="${esc(t.logo)}" style="width:40px;height:40px;border-radius:8px;object-fit:cover"/>`:''}
        <div>
          <div style="font-size:16px;font-weight:700">[${esc(t.tag)}] ${esc(t.name)}</div>
          ${d.isCaptain?'<div style="font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.06em;text-transform:uppercase">Капитан</div>':''}
        </div>
      </div>
      <a href="/team.html" class="btn btn-eq">Страница команды →</a>
    </div>
    <p class="sec-lbl">Состав</p>
    ${members.map(m=>`<div class="user-row">
      <img src="${esc(m.avatar||'')}" alt=""/>
      <span class="user-row-name"><a href="/player.html?steamId=${esc(m.steamId)}">${esc(m.displayName||'—')}</a></span>
    </div>`).join('')}
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
//  ADMIN NOTICES
// ─────────────────────────────────────────────────────────────────────────────
function renderNotices(d) {
  document.querySelectorAll('.notice').forEach(el=>el.remove());
  const page = document.querySelector('.page');
  (d.adminNotices||[]).forEach((n,i)=>{
    const div = document.createElement('div');
    div.className = 'notice';
    div.innerHTML = `<span>⚡</span><span class="notice-msg">${esc(n.message)}</span>
      <button class="btn btn-uneq" data-notice="${i}">✕</button>`;
    page.prepend(div);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
//  ДЕЛЕГИРОВАНИЕ СОБЫТИЙ (один обработчик вместо onclick в каждой карточке)
// ─────────────────────────────────────────────────────────────────────────────
document.addEventListener('click', async e => {
  const btn = e.target.closest('button[data-action],button[data-faction],button[data-taction],button[data-notice]');
  if (!btn) return;
  btn.disabled = true;

  try {
    // Инвентарь: надеть / снять
    if (btn.dataset.action === 'eq')   await doEquip(btn.dataset.id,   btn.dataset.slot);
    if (btn.dataset.action === 'uneq') await doUnequip(btn.dataset.slot);

    // Друзья
    if (btn.dataset.faction) await api(`/api/friends/${btn.dataset.faction}`, 'POST', { fromId: btn.dataset.fid });

    // Команда
    if (btn.dataset.taction) await api(`/api/teams/invite/${btn.dataset.taction}`, 'POST', { idx: +btn.dataset.ti });

    // Уведомление
    if (btn.dataset.notice !== undefined) await api('/api/profile/dismiss-notice','POST',{idx:+btn.dataset.notice});

    await loadProfile();
  } catch(err) {
    console.error(err);
    btn.disabled = false;
  }
});

// ─────────────────────────────────────────────────────────────────────────────
//  API
// ─────────────────────────────────────────────────────────────────────────────
async function api(url, method='GET', body) {
  const r = await fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json' },
    ...(body ? { body: JSON.stringify(body) } : {}),
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function doEquip(itemId, slot)  { await api('/api/profile/equip',   'POST', { itemId, slot }) }
async function doUnequip(slot)        { await api('/api/profile/unequip', 'POST', { slot })         }

// ─────────────────────────────────────────────────────────────────────────────
//  TABS
// ─────────────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ─────────────────────────────────────────────────────────────────────────────
//  ЗАГРУЗКА — один fetch, без setInterval, без polling
// ─────────────────────────────────────────────────────────────────────────────
async function loadProfile() {
  const d = await api('/api/profile');
  renderHeader(d);
  renderEquipped(d);
  renderInventory(d);
  renderOverview(d);
  renderFriends(d);
  renderTeam(d);
  renderNotices(d);
}

loadProfile();
</script>
